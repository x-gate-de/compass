# Datei: deploy/nginx-compass.example.com.conf
# Autor: Torben <github@x-gate.de>
# Version: 1.0.0
# Lizenz: AGPL-3.0-or-later — siehe LICENSE.
# Zweck:
# - nginx-Reverse-Proxy fuer die compass Web-UI (uvicorn auf 127.0.0.1:8100).
# Betriebs- und Wartungshinweise:
# - Extern: traefik (traefik.example.com) terminiert TLS fuer compass.example.com und routet
#   mit erhaltenem Host-Header auf 192.0.2.10:80. Daher genuegt hier der :80-Block.
# - Intern direkt erreichbar ueber compass.internal.example.com:80.
# - Nach /etc/nginx/sites-available/ kopieren und in sites-enabled verlinken.
# - CSP: frame-src erlaubt ausschliesslich die interne Grafana-Instanz (Dashboard-Embed).
#   Host in grafana.base_url (config.yaml) und hier identisch halten.
# - client_max_body_size 32m wegen Chat-Anhang-Uploads (OMEMO-Media).
# -----------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name compass.example.com compass.internal.example.com;

    # Chat-Anhang-Uploads (OMEMO-Media): nginx-Default waere nur 1 MB.
    client_max_body_size 32m;

    # Skripte/Styles 'self'; Inline-Styles fuer dynamische Breiten/Farben erlaubt.
    # frame-src: nur interne Grafana zum Einbetten von Dashboards.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-src 'self' https://grafana.example.com; base-uri 'none'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
